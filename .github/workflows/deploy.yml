name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v2

      # Steps for main branch deployment (HTML, CSS, JS only)
      - name: Deploy main branch to root
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.email "ferrufinoda2@vcu.edu"
          git config --global user.name "deHank"
          git add .
          git commit -m "Deploy static site to root of main" || echo "No changes to commit"
          git push origin main
