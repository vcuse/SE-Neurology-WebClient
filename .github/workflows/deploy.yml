name: Deploy Sites to GitHub Pages

on:
  push:
    branches:
      - main
      - dev

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      # Deploy static HTML/CSS site for main branch
      - name: Deploy HTML/CSS Site to Root
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.email "ferrufinoda2@vcu.edu"
          git config --global user.name "deHank"
          # Ensure the latest changes are present on the main branch
          git pull origin main
          git add .
          git commit -m "Deploy HTML/CSS site to root" || true
          git push origin main

      # Deploy Next.js site to /dev for dev branch
      - name: Set up Node.js for Dev Branch
        if: github.ref == 'refs/heads/dev'
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: yarn

      - name: Install dependencies for Next.js site
        if: github.ref == 'refs/heads/dev'
        run: yarn install --ignore-peer-deps

      - name: Configure Pages for Dev Branch
        if: github.ref == 'refs/heads/dev'
        uses: actions/configure-pages@v4

      - name: Build Next.js Site with /dev Base Path
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "module.exports = { output: 'export', basePath: '/dev', images: { unoptimized: true } };" > next.config.js
          NEXT_SKIP_ESLINT_CHECK=true yarn next build

      - name: Upload artifact for Dev Site
        if: github.ref == 'refs/heads/dev'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
